<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#FAF6EE"/>
      <stop offset="100%" stop-color="#EFE6D2"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative border -->
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="#C9A961" stroke-width="2"/>
  <rect x="55" y="55" width="1090" height="520" fill="none" stroke="#C9A961" stroke-width="0.5" stroke-dasharray="3 6"/>

  <!-- Wordmark -->
  <text x="600" y="280" text-anchor="middle" font-family="Georgia, serif" font-size="120" font-weight="400" fill="#7A2B2B">Bites</text>
  <text x="600" y="350" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-weight="300" font-size="42" fill="#5A4A3F">by Kanchan</text>

  <!-- Divider -->
  <line x1="450" y1="395" x2="560" y2="395" stroke="#C9A961" stroke-width="1.5"/>
  <circle cx="600" cy="395" r="5" fill="none" stroke="#C9A961" stroke-width="1.5"/>
  <circle cx="600" cy="395" r="1.5" fill="#C9A961"/>
  <line x1="640" y1="395" x2="750" y2="395" stroke="#C9A961" stroke-width="1.5"/>

  <!-- Tagline -->
  <text x="600" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" letter-spacing="6" fill="#7A2B2B">CURATED INDIAN CATERING · NYC</text>

  <text x="600" y="510" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="32" fill="#2C1810">From my kitchen to your table.</text>

  <!-- Corner ornaments -->
  <g transform="translate(110 110)" stroke="#6B7F4F" stroke-width="1.5" fill="none">
    <path d="M0 0 Q 8 20, 0 40"/>
    <path d="M0 8 Q -12 12, -16 22"/>
    <path d="M0 18 Q 12 22, 16 32"/>
  </g>
  <g transform="translate(1090 520) rotate(180)" stroke="#6B7F4F" stroke-width="1.5" fill="none">
    <path d="M0 0 Q 8 20, 0 40"/>
    <path d="M0 8 Q -12 12, -16 22"/>
    <path d="M0 18 Q 12 22, 16 32"/>
  </g>
</svg>
